services:
  # 내 자바 프로젝트
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    restart: always  # 🔥 핵심! DB가 켜질 때까지 계속 재시작하며 버팀
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/ticket_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8

  # MySQL 데이터베이스
  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=ticketpass
      - MYSQL_DATABASE=ticket_db
    ports:
      - "3304:3306"

  # Redis 대기열
  redis:
    image: redis:latest
    ports:
      - "6379:6379"